name: Build LiteRT-LM with Sampler Fix

on:
  workflow_dispatch:
    inputs:
      litert_version:
        description: 'LiteRT-LM version/commit'
        required: false
        default: 'v0.12.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LiteRT-LM
        uses: actions/checkout@v4
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: ${{ inputs.litert_version || 'v0.12.0' }}
          path: LiteRT-LM

      - name: Apply Sampler Fix
        run: |
          cd LiteRT-LM
          FILE=$(find runtime/executor -name "llm_litert_compiled_model_executor.cc" | head -1)
          echo "Found: $FILE"
          
          if grep -q "sampler_params.set_k(1)" "$FILE"; then
            echo "Found hardcoded defaults, applying fix..."
            sed -i 's/sampler_params.set_k(1);/sampler_params.set_k(40);/' "$FILE"
            sed -i 's/sampler_params.set_p(0.0f);/sampler_params.set_p(0.9f);/' "$FILE"
            echo "Fix applied. New values:"
            grep -n "set_k\|set_p\|set_temperature" "$FILE" | head -5
          else
            echo "File may already be fixed or structure changed"
          fi

      - name: Build JNI (C++ shared library)
        run: |
          cd LiteRT-LM
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/download/v1.20.0/bazelisk-linux-amd64 -o /tmp/bazelisk
          chmod +x /tmp/bazelisk
          export PATH="/tmp:$PATH"
          
          # Fix checksum issue - update WORKSPACE to use actual checksum
          sed -i 's/9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23/f26d3428baed184d98cc1d649fd25594bbde935538b83f83a4cb6c78df5e2536/' WORKSPACE
          
          # Clear any cached minizip repos to avoid stale checksum errors
          rm -rf ~/.cache/bazel/_bazel_runner/*/external/minizip 2>/dev/null || true
          
          bazel build --config=android_arm64 //kotlin/java/com/google/ai/edge/litertlm/jni:litertlm_jni --jobs=4

      - name: List outputs
        run: |
          ls -la LiteRT-LM/bazel-bin/kotlin/java/com/google/ai/edge/litertlm/jni/ 2>/dev/null || echo "JNI output not found"

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-android-artifacts
          path: LiteRT-LM/bazel-bin/kotlin/java/com/google/ai/edge/litertlm/jni/liblitertlm_jni.so